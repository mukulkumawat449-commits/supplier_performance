<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Supplier Performance AI{% endblock %}</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

  <style>
    :root {
      --accent:   #4361ee;
      --accent2:  #7209b7;
      --accent3:  #f72585;
      --dark:     #0d0e1a;
      --card-bg:  #13152b;
      --border:   rgba(67,97,238,0.25);
      --text:     #e2e4f0;
      --muted:    #8b90b8;
      --success:  #4cc9f0;
      --danger:   #f72585;
      --grad:     linear-gradient(135deg, #4361ee 0%, #7209b7 60%, #f72585 100%);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Navbar ─────────────────────────────────────── */
    .navbar {
      background: rgba(13,14,26,0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 14px 0;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .navbar-brand {
      font-size: 1.3rem;
      font-weight: 700;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .navbar-brand i { -webkit-text-fill-color: unset; color: var(--accent); }

    .nav-link {
      color: var(--muted) !important;
      font-weight: 500;
      font-size: 0.92rem;
      padding: 6px 14px !important;
      border-radius: 8px;
      transition: all .2s;
    }
    .nav-link:hover, .nav-link.active {
      color: #fff !important;
      background: rgba(67,97,238,0.15);
    }
    .nav-link.active { color: var(--accent) !important; }

    /* ── Hero Gradient Mesh ──────────────────────────── */
    .hero-mesh {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(67,97,238,.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 70%, rgba(114,9,183,.15) 0%, transparent 55%),
        radial-gradient(ellipse 50% 30% at 50% 50%, rgba(247,37,133,.08) 0%, transparent 50%);
      pointer-events: none;
    }

    /* ── Cards ──────────────────────────────────────── */
    .card-glass {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 18px;
      transition: border-color .25s, box-shadow .25s;
    }
    .card-glass:hover {
      border-color: rgba(67,97,238,.5);
      box-shadow: 0 8px 32px rgba(67,97,238,.12);
    }

    .stat-card {
      padding: 20px 22px;
      text-align: center;
    }
    .stat-card .stat-val {
      font-size: 2rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      background: var(--grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-card .stat-label {
      font-size: 0.82rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-top: 4px;
    }

    /* ── Buttons ─────────────────────────────────────── */
    .btn-grad {
      background: var(--grad);
      border: none;
      color: #fff;
      font-weight: 600;
      border-radius: 12px;
      padding: 12px 28px;
      transition: opacity .2s, transform .15s;
    }
    .btn-grad:hover { opacity: .88; transform: translateY(-1px); color: #fff; }

    .btn-outline-accent {
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 10px;
      font-weight: 500;
      background: transparent;
      transition: all .2s;
    }
    .btn-outline-accent:hover {
      background: var(--accent);
      color: #fff;
    }

    /* ── Forms ───────────────────────────────────────── */
    .form-control, .form-select {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      font-size: .92rem;
    }
    .form-control:focus, .form-select:focus {
      background: rgba(67,97,238,.07);
      border-color: var(--accent);
      color: var(--text);
      box-shadow: 0 0 0 3px rgba(67,97,238,.18);
    }
    .form-control::placeholder { color: var(--muted); }
    .form-label {
      font-size: .83rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 5px;
    }
    .form-select option { background: #1a1b2e; }

    /* ── Section heading ─────────────────────────────── */
    .section-title {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .section-sub {
      color: var(--muted);
      font-size: .95rem;
      margin-bottom: 32px;
    }

    /* ── Badge pills ─────────────────────────────────── */
    .pill {
      display: inline-block;
      font-size: .75rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 999px;
      letter-spacing: .05em;
    }
    .pill-blue { background: rgba(67,97,238,.2); color: #7b9bf5; }
    .pill-purple { background: rgba(114,9,183,.2); color: #c77dff; }
    .pill-pink { background: rgba(247,37,133,.2); color: #ff85a1; }

    /* ── Progress bar ────────────────────────────────── */
    .progress { background: rgba(255,255,255,.07); border-radius: 999px; height: 8px; }
    .progress-bar {
      background: var(--grad);
      border-radius: 999px;
    }

    /* ── Fade-in animation ───────────────────────────── */
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(18px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp .5s ease both; }
    .delay-1 { animation-delay: .1s; }
    .delay-2 { animation-delay: .2s; }
    .delay-3 { animation-delay: .3s; }

    /* ── Footer ──────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px 0;
      text-align: center;
      color: var(--muted);
      font-size: .85rem;
      margin-top: 60px;
    }
    footer span { color: var(--accent3); }

    /* ── Scrollbar ───────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 99px; }

    /* ── Range input ─────────────────────────────────── */
    input[type=range] { accent-color: var(--accent); }

    /* ── Table ───────────────────────────────────────── */
    .table-dark { --bs-table-bg: transparent; }
    .table { border-color: var(--border); }
    .table th { color: var(--muted); font-size: .8rem; text-transform: uppercase; letter-spacing: .07em; }
    .table td { color: var(--text); font-size: .9rem; }

    /* ── Responsive helpers ──────────────────────────── */
    @media (max-width: 768px) {
      .section-title { font-size: 1.3rem; }
    }
  </style>

  {% block extra_head %}{% endblock %}
</head>

<body>

<!-- ── Navbar ──────────────────────────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/">
      <i class="bi bi-graph-up-arrow me-2"></i>SupplierAI
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"
            style="border-color:var(--border);color:var(--muted);">
      <i class="bi bi-list" style="font-size:1.4rem;"></i>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='index' %}active{% endif %}" href="/">
            <i class="bi bi-cpu me-1"></i>Predict
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='visuals' %}active{% endif %}" href="/visuals">
            <i class="bi bi-bar-chart-line me-1"></i>Visuals
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='model_metrics' %}active{% endif %}" href="/metrics">
            <i class="bi bi-clipboard-data me-1"></i>Metrics
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint=='about' %}active{% endif %}" href="/about">
            <i class="bi bi-info-circle me-1"></i>About
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- ── Page Content ─────────────────────────────────────────────────────────── -->
<main>
  {% block content %}{% endblock %}
</main>

<!-- ── Footer ──────────────────────────────────────────────────────────────── -->
<footer>
  <div class="container">
    Built with <span>♥</span> using Flask + Scikit-Learn &nbsp;|&nbsp;
    Supplier Performance Intelligence System
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
